- name: Get Single Post
  method: GET
  endpoint: https://jsonplaceholder.typicode.com/posts/1
  expected_status: 200
  assertions:
    - response.id == 1
    - response.userId == 1

- name: Create Post
  method: POST
  endpoint: https://jsonplaceholder.typicode.com/posts
  payload:
    title: "foo"
    body: "bar"
    userId: 1
  expected_status: 201
  assertions:
    - response.title == "foo"
    - response.body == "bar"
    - response.userId == 1

- name: Get Single User
  method: GET
  endpoint: https://jsonplaceholder.typicode.com/users/1
  expected_status: 200
  assertions:
    - response.username == "Bret"

- name: Get Todos
  method: GET
  endpoint: https://jsonplaceholder.typicode.com/todos/1
  expected_status: 200
  assertions:
    - response.completed == false
